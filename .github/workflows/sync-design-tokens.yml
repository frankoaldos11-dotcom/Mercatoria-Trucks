name: Sync design tokens

on:
  workflow_dispatch: {}
  repository_dispatch:
    types: [tokens-actualizados]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Mercatoria-Trucks
        uses: actions/checkout@v4

      - name: Traer JSON desde mercatoria-design
        uses: actions/checkout@v4
        with:
          repository: frankoaldos11-dotcom/mercatoria-design
          ref: main
          token: ${{ secrets.DESIGN_SYNC_TOKEN }}
          path: _design-source

      - name: Listar archivo traido (diagnostico)
        run: find _design-source -maxdepth 2 -type f

      - name: Copiar JSON al catalogo de tokens
        run: cp _design-source/mercatoria-design-tokens.json tokens/mercatoria-design-tokens.json

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        run: npm install

      - name: Traducir tokens de Adrian al vocabulario espanol
        run: node tokens/scripts/sync-adrian-tokens.mjs

      - name: Regenerar CSS con Style Dictionary
        run: npm run tokens:build

      - name: Commitear si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tokens/color.json tokens/effects.json tokens/mercatoria-design-tokens.json tokens/adrian-sync-report.md static/css/tokens.css
          if git diff --cached --quiet; then
            echo "Sin cambios de diseno esta vez."
            exit 0
          fi
          git commit -m "Sync automatico: tokens de diseno actualizados desde mercatoria-design"
          git push
