<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mercatoria Truck</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>

<body>

<nav class="topbar py-3">
    <div class="container d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center gap-2">
            <img src="/static/logo-mercatoria.jpg" class="logo" alt="Mercatoria">
            <span class="fs-4 fw-bold brand-text">Mercatoria Truck</span>
        </div>

        <div class="d-flex gap-2 align-items-center">

            <a href="/" class="btn btn-nav">Home</a>
            <a href="/dashboard" class="btn btn-nav">Dashboard</a>

            <div class="dropdown">
                <button class="btn btn-nav dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    Operaciones
                </button>

                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="/nuevo-viaje">Nuevo viaje</a></li>
                    <li><a class="dropdown-item" href="/viajes">Viajes guardados</a></li>
                    <li><a class="dropdown-item" href="/camioneros">Camioneros</a></li>
                    <li><a class="dropdown-item" href="/clientes">Clientes</a></li>
                </ul>
            </div>

            <a href="/cliente" class="btn btn-outline-primary">Vista Cliente</a>

        </div>

    </div>
</nav>

<div class="orange-bar py-2">
    <div class="container fw-bold">
        {% block barra %}{% endblock %}
    </div>
</div>

<div class="container mt-5">
    {% block contenido %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
