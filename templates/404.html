<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — Mercatoria Truck</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tokens.css">
    <style>
        body {
            background: #F3F4F6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            background: var(--panel);
            border-bottom: 2px solid #E86A2C;
            padding: 0.75rem 0;
        }
        .brand-text { color: #E86A2C; font-weight: 700; font-size: 1.2rem; }
        .logo { height: 36px; border-radius: 6px; }
        .error-icon { font-size: 5rem; color: #E86A2C; }
        .error-code { font-size: 6rem; font-weight: 800; color: #E86A2C; line-height: 1; }
        .btn-home {
            background: #E86A2C;
            border: none;
            color: var(--panel);
            padding: 0.6rem 1.8rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: background 0.2s;
        }
        .btn-home:hover { background: #c85820; color: var(--panel); }
    </style>
</head>
<body>

<nav class="topbar shadow-sm">
    <div class="container d-flex align-items-center gap-2">
        <img src="/static/logo-mercatoria.jpg" class="logo" alt="Mercatoria">
        <span class="brand-text">Mercatoria Truck</span>
    </div>
</nav>

<div class="container flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="text-center py-5">
        <div class="error-icon mb-2"><i class="bi bi-compass"></i></div>
        <div class="error-code">404</div>
        <h2 class="fw-bold mt-3 mb-2" style="color:#1F2937;">Página no encontrada</h2>
        <p class="text-muted mb-4" style="max-width:400px;margin:0 auto;">
            Parece que la ruta que buscás no existe o fue movida. Revisá la URL o volvé al inicio.
        </p>
        <a href="/" class="btn-home">
            <i class="bi bi-house-door-fill"></i> Volver al inicio
        </a>
    </div>
</div>

</body>
</html>
