{% extends "base_cliente.html" %}

{% block title %}Perfil del Cliente{% endblock %}

{% block contenido %}

<h2 class="fw-bold mb-4">Mi Perfil</h2>

<div class="card p-4 shadow-sm">

    <form action="/cliente/perfil" method="POST">

        <div class="mb-3">
            <label class="form-label fw-bold">Nombre</label>
            <input type="text" name="nombre" class="form-control" value="{{ cliente.nombre }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Correo</label>
            <input type="email" name="email" class="form-control" value="{{ cliente.email }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Teléfono</label>
            <input type="text" name="telefono" class="form-control" value="{{ cliente.telefono }}">
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Empresa</label>
            <input type="text" name="empresa" class="form-control" value="{{ cliente.empresa }}">
        </div>

        <button class="btn btn-primary btn-lg mt-3">Guardar Cambios</button>

    </form>

</div>

{% endblock %}
