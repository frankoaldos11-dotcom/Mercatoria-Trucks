{% extends "base.html" %}

{% block title %}Nuevo Viaje{% endblock %}

{% block contenido %}

<h2 class="fw-bold mb-4">Crear Nuevo Viaje</h2>

<form action="/viajes/nuevo" method="POST" class="card p-4 shadow-sm">

    <div class="mb-3">
        <label class="form-label fw-bold">Cliente</label>
        <select name="cliente" class="form-select" required>
            {% for c in clientes %}
            <option value="{{ c.nombre }}">{{ c.nombre }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Origen</label>
            <input type="text" name="origen" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Destino</label>
            <input type="text" name="destino" class="form-control" required>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Precio del Viaje</label>
        <input type="number" name="precio" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Combustible Estimado</label>
        <input type="number" name="combustible" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Camionero</label>
        <select name="camionero" class="form-select" required>
            {% for c in camioneros %}
            <option value="{{ c.id }}">{{ c.nombre }} — {{ c.estado }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Observaciones</label>
        <textarea name="observaciones" class="form-control" rows="3"></textarea>
    </div>

    <button class="btn btn-primary btn-lg mt-3">Crear Viaje</button>

</form>

{% endblock %}
