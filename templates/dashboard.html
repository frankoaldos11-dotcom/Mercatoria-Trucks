{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block contenido %}

<h2 class="fw-bold mb-4">Dashboard</h2>

<div class="row g-4">

    <div class="col-md-3">
        <div class="card p-3 shadow-sm">
            <h5 class="fw-bold">Viajes Activos</h5>
            <p class="display-6">{{ activos }}</p>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3 shadow-sm">
            <h5 class="fw-bold">Pendientes</h5>
            <p class="display-6">{{ pendientes }}</p>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3 shadow-sm">
            <h5 class="fw-bold">Completados</h5>
            <p class="display-6">{{ completados }}</p>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3 shadow-sm">
            <h5 class="fw-bold">Camioneros</h5>
            <p class="display-6">{{ camioneros }}</p>
        </div>
    </div>

</div>

<hr class="my-5">

<h4 class="fw-bold mb-3">Acciones rápidas</h4>

<div class="d-flex gap-3">
    <a href="/nuevo-viaje" class="btn btn-primary btn-lg">Nuevo Viaje</a>
    <a href="/viajes" class="btn btn-outline-primary btn-lg">Ver Viajes</a>
    <a href="/clientes" class="btn btn-outline-primary btn-lg">Clientes</a>
</div>

{% endblock %}
