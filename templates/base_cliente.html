<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %} — Cliente</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>

<body>

<nav class="topbar py-3 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center gap-2">
            <img src="/static/logo-mercatoria.jpg" class="logo" alt="Mercatoria">
            <span class="fs-4 fw-bold brand-text">Mercatoria Truck</span>
        </div>

        <div class="d-flex gap-3">
            <a href="/cliente" class="nav-link fw-bold">Inicio</a>
            <a href="/cliente/nueva" class="nav-link fw-bold">Nueva Solicitud</a>
            <a href="/cliente/estado" class="nav-link fw-bold">Estado</a>
            <a href="/cliente/historial" class="nav-link fw-bold">Historial</a>
            <a href="/cliente/perfil" class="nav-link fw-bold">Perfil</a>
            <a href="/logout" class="btn btn-danger">Salir</a>
        </div>

    </div>
</nav>

<div class="container mt-5">
    {% block contenido %}{% endblock %}
</div>

</body>
</html>
