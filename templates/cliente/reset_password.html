<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña — Mercatoria Truck</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: #F3F4F6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
        }
        .brand { color: #E86A2C; font-weight: 700; font-size: 1.4rem; text-align: center; }
        .brand small { display: block; font-size: 0.8rem; color: #6B7280; font-weight: 400; margin-top: 2px; }
        .form-label { font-size: 0.82rem; font-weight: 600; color: #374151; }
        .form-control { border-radius: 8px; border: 1.5px solid #D1D5DB; font-size: 0.9rem; }
        .form-control:focus { border-color: #E86A2C; box-shadow: 0 0 0 3px rgba(232,106,44,0.15); }
        .btn-main {
            background: #E86A2C; color: #fff; border: none;
            border-radius: 8px; font-weight: 700; font-size: 0.95rem;
            padding: 0.65rem; width: 100%; transition: background 0.15s;
        }
        .btn-main:hover { background: #C45520; }
        .alert-error-custom {
            background: #FEF2F2; border-left: 4px solid #DC2626; color: #991B1B;
            border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; margin-bottom: 1.25rem;
        }
        .link-back { font-size: 0.82rem; color: #6B7280; text-align: center; margin-top: 1.25rem; }
        .link-back a { color: #E86A2C; text-decoration: none; font-weight: 600; }
        .link-back a:hover { color: #C45520; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand mb-4">
        <i class="bi bi-truck-front-fill"></i> Mercatoria Truck
        <small>Establecer nueva contraseña</small>
    </div>

    {% if error %}
    <div class="alert-error-custom">
        <i class="bi bi-exclamation-circle me-1"></i> {{ error }}
    </div>
    {% endif %}

    {% if token %}
    <form method="POST" action="/cliente/reset/{{ token }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label">Nueva contraseña</label>
            <input type="password" name="password" class="form-control"
                   placeholder="Mínimo 6 caracteres" required autofocus minlength="6">
        </div>
        <div class="mb-4">
            <label class="form-label">Confirmar contraseña</label>
            <input type="password" name="confirmar" class="form-control"
                   placeholder="Repite la contraseña" required minlength="6">
        </div>
        <button type="submit" class="btn-main">
            <i class="bi bi-lock me-1"></i> Guardar nueva contraseña
        </button>
    </form>
    {% else %}
    <div class="link-back" style="margin-top:0.5rem;">
        <a href="/cliente/recuperar"><i class="bi bi-arrow-left me-1"></i>Solicitar un nuevo enlace</a>
    </div>
    {% endif %}

    <div class="link-back">
        <a href="/login"><i class="bi bi-arrow-left me-1"></i>Volver al inicio de sesión</a>
    </div>
</div>

</body>
</html>
