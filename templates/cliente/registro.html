<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta — Mercatoria Truck</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tokens.css?v=1">
    <style>
        body {
            background: #F3F4F6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 1.5rem;
        }
        .register-card {
            background: var(--panel);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 2.25rem 2rem;
            width: 100%; max-width: 480px;
        }
        .brand { color: #E86A2C; font-weight: 700; font-size: 1.3rem; text-align: center; }
        .brand small { display: block; font-size: 0.8rem; color: #6B7280; font-weight: 400; margin-top: 2px; }
        .form-label { font-size: 0.82rem; font-weight: 600; color: #374151; }
        .required { color: var(--danger); }
        .form-control, .form-select { border-radius: 8px; border: 1.5px solid #D1D5DB; font-size: 0.9rem; }
        .form-control:focus, .form-select:focus {
            border-color: #E86A2C; box-shadow: 0 0 0 3px rgba(232,106,44,0.15);
        }
        .form-text { font-size: 0.75rem; color: #9CA3AF; }
        .section-divider {
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.06em; color: #9CA3AF;
            border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; margin: 1.5rem 0 1rem;
        }
        .btn-register {
            background: #E86A2C; color: var(--panel); border: none;
            border-radius: 8px; font-weight: 700; font-size: 0.95rem;
            padding: 0.65rem; width: 100%; transition: background 0.15s;
        }
        .btn-register:hover { background: #C45520; }
        .link-login { font-size: 0.85rem; text-align: center; margin-top: 1.25rem; }
        .link-login a { color: #E86A2C; font-weight: 600; text-decoration: none; }
        .alert-error-custom {
            background: #FEF2F2; border-left: 4px solid var(--danger); color: #991B1B;
            border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; margin-bottom: 1.25rem;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="brand mb-4">
        <i class="bi bi-truck-front-fill"></i> Mercatoria Truck
        <small>Crear cuenta de cliente</small>
    </div>

    {% if error %}
    <div class="alert-error-custom">
        <i class="bi bi-exclamation-circle me-1"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/cliente/registro">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="section-divider">Datos personales</div>

        <div class="row g-3 mb-3">
            <div class="col-sm-6">
                <label class="form-label">Nombre <span class="required">*</span></label>
                <input type="text" name="nombre" class="form-control"
                       value="{{ form.nombre if form else '' }}" required>
            </div>
            <div class="col-sm-6">
                <label class="form-label">Apellidos</label>
                <input type="text" name="apellidos" class="form-control"
                       value="{{ form.apellidos if form else '' }}">
            </div>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-sm-6">
                <label class="form-label">Teléfono</label>
                <input type="tel" name="telefono" class="form-control"
                       value="{{ form.telefono if form else '' }}" placeholder="+34 600 000 000">
            </div>
            <div class="col-sm-6">
                <label class="form-label">Empresa</label>
                <input type="text" name="empresa" class="form-control"
                       value="{{ form.empresa if form else '' }}" placeholder="Opcional">
            </div>
        </div>

        <div class="section-divider">Acceso</div>

        <div class="mb-3">
            <label class="form-label">Correo electrónico <span class="required">*</span></label>
            <input type="email" name="email" class="form-control"
                   value="{{ form.email if form else '' }}" placeholder="tu@correo.com" required>
            <div class="form-text">Se usará como nombre de usuario para iniciar sesión</div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-sm-6">
                <label class="form-label">Contraseña <span class="required">*</span></label>
                <input type="password" name="password" class="form-control"
                       placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <div class="col-sm-6">
                <label class="form-label">Confirmar contraseña <span class="required">*</span></label>
                <input type="password" name="confirmar" class="form-control"
                       placeholder="Repite la contraseña" required>
            </div>
        </div>

        <button type="submit" class="btn-register">
            <i class="bi bi-person-check me-1"></i> Crear cuenta
        </button>
    </form>

    <div class="link-login">
        ¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a>
    </div>
</div>

</body>
</html>
