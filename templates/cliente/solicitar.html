{% extends "base_cliente.html" %}

{% block contenido %}

<link rel="stylesheet" href="/static/css/cliente.css">

<div class="contenedor">

    <h2>Nueva Solicitud de Envío</h2>

    {% if error %}
        <div style="background:#ffdddd; padding:12px; border-left:4px solid #d93025; margin-bottom:20px;">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" class="card" style="max-width:600px; margin:auto;">

        <label>Origen</label>
        <input type="text" name="origen" required class="input">

        <label>Destino</label>
        <input type="text" name="destino" required class="input">

        <label>Tipo de carga</label>
        <input type="text" name="tipo" required class="input">

        <label>Peso / Volumen</label>
        <input type="text" name="peso" required class="input">

        <label>Notas adicionales</label>
        <textarea name="notas" class="input" rows="4"></textarea>

        <button class="btn-principal" type="submit">Enviar Solicitud</button>

    </form>

</div>

<style>
.input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    margin-bottom: 18px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
.btn-principal {
    background: #1a73e8;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}
.btn-principal:hover {
    background: #155fc0;
}
</style>

{% endblock %}
