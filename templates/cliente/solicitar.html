{% extends "base.html" %}

{% block barra %}
Nueva Solicitud
{% endblock %}

{% block contenido %}

<h3 class="fw-bold mb-4">Crear Solicitud</h3>

<form method="POST">

    <label class="form-label">Ruta</label>
    <select name="ruta" class="form-select mb-3">
        {% for r in rutas %}
        <option value="{{ r.id }}">{{ r.origen }} → {{ r.destino }}</option>
        {% endfor %}
    </select>

    <label class="form-label">Tipo de carga</label>
    <select name="tipo" class="form-select mb-3">
        <option value="seca">Seca estándar</option>
        <option value="refrigerada">Refrigerada</option>
        <option value="desagrupada">Seca desagrupada</option>
    </select>

    <label class="form-label">Punto de recogida</label>
    <input type="text" name="recogida" class="form-control mb-3">

    <label class="form-label">Punto de entrega</label>
    <input type="text" name="entrega" class="form-control mb-3">

    <button class="btn btn-primary">Enviar Solicitud</button>

</form>

{% endblock %}
