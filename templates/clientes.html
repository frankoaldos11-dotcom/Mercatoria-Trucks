<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clientes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f7f7f7;color:#14213D;}
.topbar{background:white;border-bottom:4px solid #F36B21;}
.brand-box{width:26px;height:26px;border:4px solid #F36B21;border-radius:4px;display:inline-block;margin-right:10px;}
.orange-bar{background:#F36B21;color:white;}
.main-card{background:white;border-radius:18px;padding:20px;box-shadow:0 15px 40px rgba(0,0,0,.1);}
</style>

</head>
<body>

<nav class="topbar py-3">
<div class="container d-flex justify-content-between align-items-center">
<div class="fs-4 fw-bold"><span class="brand-box"></span>Mercatoria Truck</div>
<div>
<a href="/dashboard" class="btn btn-sm btn-outline-dark">Dashboard</a>
<a href="/" class="btn btn-sm btn-outline-dark">Nuevo viaje</a>
<a href="/viajes" class="btn btn-sm btn-outline-dark">Viajes</a>
<a href="/camioneros" class="btn btn-sm btn-outline-dark">Camioneros</a>
<a href="/clientes" class="btn btn-sm btn-outline-dark">Clientes</a>
</div>
</div>
</nav>

<div class="orange-bar py-2">
<div class="container fw-bold">Gestión de clientes · MVP v0.3</div>
</div>

<div class="container mt-5">

<h1>Clientes</h1>

<div class="main-card mt-4 mb-4">

<form method="POST">

<div class="row">

<div class="col-md-3 mb-3">
<label>Empresa</label>
<input class="form-control" name="nombre" required>
</div>

<div class="col-md-3 mb-3">
<label>Contacto</label>
<input class="form-control" name="contacto">
</div>

<div class="col-md-3 mb-3">
<label>Teléfono</label>
<input class="form-control" name="telefono">
</div>

<div class="col-md-3 mb-3">
<label>Email</label>
<input class="form-control" name="email">
</div>

</div>

<button class="btn btn-warning">Guardar cliente</button>

</form>

</div>

<div class="main-card">

<table class="table">
<thead>
<tr>
<th>ID</th>
<th>Empresa</th>
<th>Contacto</th>
<th>Teléfono</th>
<th>Email</th>
</tr>
</thead>

<tbody>
{% for cliente in clientes %}
<tr>
<td>{{ cliente[0] }}</td>
<td>{{ cliente[1] }}</td>
<td>{{ cliente[2] }}</td>
<td>{{ cliente[3] }}</td>
<td>{{ cliente[4] }}</td>
</tr>
{% endfor %}
</tbody>
</table>

</div>

</div>

</body>
</html>
