<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mercatoria Truck</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f7f7f7;
            color: #14213D;
        }

        .topbar {
            background: white;
            border-bottom: 4px solid #F36B21;
        }

        .brand-box {
            width: 26px;
            height: 26px;
            border: 4px solid #F36B21;
            border-radius: 4px;
            display: inline-block;
            margin-right: 10px;
            vertical-align: middle;
        }

        .orange-bar {
            background: #F36B21;
            color: white;
        }

        .main-card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(0,0,0,0.12);
        }

        .btn-mercatoria {
            background: #F36B21;
            color: white;
            font-weight: 600;
            border: none;
        }

        .btn-mercatoria:hover {
            background: #d95714;
            color: white;
        }

        .result-card {
            border-left: 6px solid #F36B21;
            background: #fff7f1;
        }
    </style>
</head>

<body>

<nav class="topbar py-3">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="fs-4 fw-bold">
            <span class="brand-box"></span>
            Mercatoria Truck
        </div>
        <div class="fw-semibold text-muted">
            MVP v0.1
        </div>
    </div>
</nav>

<div class="orange-bar py-2">
    <div class="container fw-semibold">
        Plataforma logística · Gestión de viajes · Transporte de carga
    </div>
</div>

<div class="container mt-5">

    <div class="mb-4">
        <h1 class="fw-bold">Gestión de Viajes</h1>
        <p class="text-muted">Calculadora logística interna para operaciones de transporte.</p>
    </div>

    <div class="card main-card">
        <div class="card-body p-4">

            <form method="POST">

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Cliente</label>
                        <input type="text" class="form-control" name="cliente" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Origen</label>
                        <input type="text" class="form-control" name="origen" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Destino</label>
                        <input type="text" class="form-control" name="destino" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Precio viaje USD</label>
                        <input type="number" step="0.01" class="form-control" name="precio" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Combustible USD</label>
                        <input type="number" step="0.01" class="form-control" name="combustible" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Pago camionero USD</label>
                        <input type="number" step="0.01" class="form-control" name="camionero" required>
                    </div>

                </div>

                <button class="btn btn-mercatoria btn-lg w-100 mt-2">
                    Calcular viaje
                </button>

            </form>

            {% if resultado %}
            <div class="card result-card mt-4">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Resultado del Viaje</h5>
                    <pre style="font-size:16px; margin:0;">{{ resultado }}</pre>
                </div>
            </div>
            {% endif %}

        </div>
    </div>

</div>

</body>
</html>
