{% extends "admin/base_admin.html" %}

{% block contenido %}

<div class="page-header">
    <div>
        <span class="eyebrow">Recursos</span>
        <h1>Editar Camionero #{{ camionero.id }}</h1>
        <p>Actualiza los datos del transportista.</p>
    </div>
    <a href="/admin/camioneros" class="btn-volver">← Volver</a>
</div>

<section class="panel">
    <div style="padding: 28px; max-width: 720px;">
        {% if error %}
        <div style="background:#fde8e8;color:#c0392b;border-radius:8px;padding:12px 16px;margin-bottom:18px;font-size:14px;font-weight:600;">
            {{ error }}
        </div>
        {% endif %}
        <form method="POST" action="/admin/camioneros/{{ camionero.id }}/editar">

            <div class="edit-row">
                <div class="edit-field">
                    <label>Nombre *</label>
                    <input type="text" name="nombre" class="input-crud"
                           value="{{ camionero.nombre }}" required>
                </div>
                <div class="edit-field">
                    <label>Teléfono</label>
                    <input type="text" name="telefono" class="input-crud"
                           value="{{ camionero.telefono or '' }}">
                </div>
            </div>

            <div class="edit-row">
                <div class="edit-field">
                    <label>Licencia</label>
                    <input type="text" name="licencia" class="input-crud"
                           value="{{ camionero.licencia or '' }}">
                </div>
                <div class="edit-field" style="max-width: 340px;">
                    <label>Estado</label>
                    <select name="estado" class="input-crud">
                        {% for e in estados %}
                        <option value="{{ e }}" {% if camionero.estado == e %}selected{% endif %}>
                            {{ e }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <p style="font-size:13px;font-weight:700;color:#E86A2C;text-transform:uppercase;letter-spacing:.05em;margin:24px 0 12px;">
                Vehículo
            </p>

            <div class="edit-row">
                <div class="edit-field">
                    <label>Matrícula</label>
                    <input type="text" name="matricula" class="input-crud"
                           value="{{ vehiculo.matricula if vehiculo else '' }}"
                           placeholder="Matrícula">
                </div>
                <div class="edit-field">
                    <label>Marca</label>
                    <input type="text" name="marca" class="input-crud"
                           value="{{ vehiculo.marca if vehiculo else '' }}"
                           placeholder="Marca">
                </div>
            </div>

            <div class="edit-row">
                <div class="edit-field">
                    <label>Modelo</label>
                    <input type="text" name="modelo" class="input-crud"
                           value="{{ vehiculo.modelo if vehiculo else '' }}"
                           placeholder="Modelo">
                </div>
                <div class="edit-field">
                    <label>Tipo</label>
                    <input type="text" name="tipo" class="input-crud"
                           value="{{ vehiculo.tipo if vehiculo else '' }}"
                           placeholder="Tipo de transporte">
                </div>
            </div>

            <div class="edit-row">
                <div class="edit-field">
                    <label>Capacidad</label>
                    <input type="text" name="capacidad" class="input-crud"
                           value="{{ vehiculo.capacidad if vehiculo else '' }}"
                           placeholder="Ej: 10 ton">
                </div>
            </div>

            <div class="edit-actions">
                <button type="submit" class="btn-crud-primary">Guardar cambios</button>
                <a href="/admin/camioneros" class="btn-crud-secondary">Cancelar</a>
            </div>

        </form>
    </div>
</section>

<style>
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
    margin-bottom: 28px;
}

.btn-volver {
    color: #555;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #f9f9f9;
    white-space: nowrap;
}

.btn-volver:hover { background: #eee; }

.edit-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 18px;
}

.edit-field { margin-bottom: 18px; }

.edit-field label {
    display: block;
    font-size: 12px;
    color: #666;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-bottom: 6px;
}

.input-crud {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    box-sizing: border-box;
    background: #fafafa;
}

.input-crud:focus {
    outline: none;
    border-color: #E86A2C;
    background: #fff;
}

.edit-actions {
    display: flex;
    gap: 12px;
    margin-top: 28px;
}

.btn-crud-primary {
    background: #E86A2C;
    color: white;
    padding: 11px 24px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
}

.btn-crud-primary:hover { background: #d95714; }

.btn-crud-secondary {
    background: #f0f0f0;
    color: #555;
    padding: 11px 24px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
}

.btn-crud-secondary:hover { background: #e0e0e0; }
</style>

{% endblock %}
