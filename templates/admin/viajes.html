{% extends "admin/base_admin.html" %}

{% block contenido %}

<h1>Gestión de Viajes</h1>

<table class="tabla">
    <thead>
        <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Origen</th>
            <th>Destino</th>
            <th>Estado</th>
            <th>Camionero</th>
            <th>Acción</th>
        </tr>
    </thead>

    <tbody>
        {% for v in lista %}
        <tr>
            <td>{{ v[0] }}</td>
            <td>{{ v[1] }}</td>
            <td>{{ v[2] }}</td>
            <td>{{ v[3] }}</td>
            <td>{{ v[4] }}</td>
            <td>{{ v[5] if v[5] else "Sin asignar" }}</td>
            <td>
                <a href="/admin/viaje/{{ v[0] }}">Gestionar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
