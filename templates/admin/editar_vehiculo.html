{% extends "admin/base_admin.html" %}

{% block contenido %}

<div class="page-header-vehiculos">
    <div>
        <span class="eyebrow">Recursos</span>
        <h1>Editar vehículo</h1>
        <p>Actualiza los datos del vehículo en el sistema.</p>
    </div>
    <a href="/admin/vehiculos" class="btn-volver">← Volver a vehículos</a>
</div>

<section class="panel">
    <div class="panel-header">
        <div>
            <h2>{{ vehiculo.matricula }}</h2>
            <p>Modifica los campos necesarios y guarda los cambios.</p>
        </div>
    </div>
    <div style="padding: 24px;">
        <form method="POST" action="/admin/vehiculos/{{ vehiculo.id }}/editar" class="form-crud-grid">
            <div class="form-crud-field">
                <label>Matrícula *</label>
                <input type="text" name="matricula" class="input-crud" required value="{{ vehiculo.matricula }}">
            </div>
            <div class="form-crud-field">
                <label>Tipo</label>
                <input type="text" name="tipo" class="input-crud" value="{{ vehiculo.tipo or '' }}" placeholder="Ej: Plataforma, Toldo">
            </div>
            <div class="form-crud-field">
                <label>Marca</label>
                <input type="text" name="marca" class="input-crud" value="{{ vehiculo.marca or '' }}" placeholder="Ej: Volvo, MAN" data-ac="marca" autocomplete="off">
            </div>
            <div class="form-crud-field">
                <label>Modelo</label>
                <input type="text" name="modelo" class="input-crud" value="{{ vehiculo.modelo or '' }}" placeholder="Ej: FH16 2022" data-ac="modelo" autocomplete="off">
            </div>
            <div class="form-crud-field">
                <label>Capacidad</label>
                <input type="text" name="capacidad" class="input-crud" value="{{ vehiculo.capacidad or '' }}" placeholder="Ej: 24 ton">
            </div>
            <div class="form-crud-field">
                <label>Camionero asignado</label>
                <select name="camionero_id" class="input-crud">
                    <option value="">— Sin asignar —</option>
                    {% for c in camioneros %}
                    <option value="{{ c.id }}" {% if c.id == vehiculo.camionero_id %}selected{% endif %}>
                        {{ c.nombre }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-crud-field">
                <label>Estado</label>
                <select name="estado" class="input-crud">
                    {% for e in estados %}
                    <option value="{{ e }}" {% if e == vehiculo.estado %}selected{% endif %}>{{ e }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-crud-field form-crud-submit">
                <button type="submit" class="btn-crud-primary">Guardar cambios</button>
            </div>
        </form>
    </div>
</section>

<style>
.page-header-vehiculos {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 24px;
}

.btn-volver {
    color: #666;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    flex-shrink: 0;
}

.btn-volver:hover { background: #f5f5f5; color: #333; }

.form-crud-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 16px;
    align-items: end;
}

.form-crud-field label {
    display: block;
    font-size: 12px;
    color: #666;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-bottom: 6px;
}

.input-crud {
    width: 100%;
    padding: 9px 13px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    box-sizing: border-box;
    background: #fafafa;
}

.input-crud:focus {
    outline: none;
    border-color: #F36B21;
    background: #fff;
}

.form-crud-submit { display: flex; align-items: flex-end; }

.btn-crud-primary {
    width: 100%;
    background: #F36B21;
    color: white;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
}

.btn-crud-primary:hover { background: #d95714; }
</style>

{% block scripts %}
<style>
.ac-wrapper { position: relative; }
.ac-list {
    position: absolute;
    top: calc(100% + 2px);
    left: 0;
    right: 0;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,.1);
    z-index: 100;
    list-style: none;
    margin: 0;
    padding: 4px 0;
    display: none;
    max-height: 220px;
    overflow-y: auto;
}
.ac-item {
    padding: 8px 13px;
    font-size: 14px;
    cursor: pointer;
    color: #333;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.ac-item:hover, .ac-item.ac-active {
    background: #fff3ec;
    color: #F36B21;
}
</style>
<script>
function initAutocomplete(inputEl) {
    const field = inputEl.closest('.form-crud-field');
    field.classList.add('ac-wrapper');

    const list = document.createElement('ul');
    list.className = 'ac-list';
    field.appendChild(list);

    let timer;
    let activeIdx = -1;

    function renderList(items) {
        list.innerHTML = '';
        activeIdx = -1;
        if (!items.length) { list.style.display = 'none'; return; }
        items.forEach(item => {
            const li = document.createElement('li');
            li.className = 'ac-item';
            li.textContent = item;
            li.addEventListener('mousedown', e => {
                e.preventDefault();
                inputEl.value = item;
                list.style.display = 'none';
            });
            list.appendChild(li);
        });
        list.style.display = 'block';
    }

    inputEl.addEventListener('input', () => {
        clearTimeout(timer);
        const q = inputEl.value.trim();
        if (!q) { list.style.display = 'none'; return; }
        timer = setTimeout(async () => {
            try {
                const res = await fetch(`/admin/vehiculos/sugerencias?campo=${inputEl.dataset.ac}&q=${encodeURIComponent(q)}`);
                renderList(await res.json());
            } catch (_) {}
        }, 200);
    });

    inputEl.addEventListener('keydown', e => {
        const items = list.querySelectorAll('.ac-item');
        if (!items.length) return;
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            activeIdx = Math.min(activeIdx + 1, items.length - 1);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            activeIdx = Math.max(activeIdx - 1, -1);
        } else if (e.key === 'Enter' && activeIdx >= 0) {
            e.preventDefault();
            inputEl.value = items[activeIdx].textContent;
            list.style.display = 'none';
            activeIdx = -1;
            return;
        } else if (e.key === 'Escape') {
            list.style.display = 'none';
            activeIdx = -1;
            return;
        }
        items.forEach((el, i) => el.classList.toggle('ac-active', i === activeIdx));
    });

    document.addEventListener('click', e => {
        if (!field.contains(e.target)) list.style.display = 'none';
    });
}

document.querySelectorAll('[data-ac]').forEach(initAutocomplete);
</script>
{% endblock %}

{% endblock %}
