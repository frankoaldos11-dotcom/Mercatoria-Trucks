<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mercatoria Truck - Panel Operador</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="/static/css/admin.css">
</head>

<body>

<div class="app-shell">

    <aside class="sidebar">

        <div class="brand">
            <img src="/static/logo-mercatoria.jpg" alt="Mercatoria" class="brand-logo">
            <div>
                <strong>Mercatoria Truck</strong>
                <span>Operator Panel</span>
            </div>
        </div>

        <nav class="sidebar-nav">

            <div class="nav-section">Operaciones</div>

            <a href="/admin" class="nav-item">
                <i class="bi bi-grid-1x2"></i>
                <span>Dashboard</span>
            </a>

            <a href="/admin/viajes" class="nav-item">
                <i class="bi bi-truck"></i>
                <span>Viajes</span>
            </a>

            <div class="nav-section">Recursos</div>

            <a href="/admin/camioneros" class="nav-item">
                <i class="bi bi-person-vcard"></i>
                <span>Camioneros</span>
            </a>

            <a href="/admin/clientes" class="nav-item">
                <i class="bi bi-buildings"></i>
                <span>Clientes</span>
            </a>

            <div class="nav-section">Sistema</div>

            <a href="/logout" class="nav-item logout">
                <i class="bi bi-box-arrow-right"></i>
                <span>Salir</span>
            </a>

        </nav>

    </aside>

    <main class="main-content">
        {% block contenido %}{% endblock %}
    </main>

</div>

</body>
</html>
