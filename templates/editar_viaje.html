{% extends "base.html" %}

{% block title %}Editar Viaje{% endblock %}

{% block contenido %}

<h2 class="fw-bold mb-4">Editar Viaje #{{ viaje.id }}</h2>

<form action="/viajes/editar/{{ viaje.id }}" method="POST" class="card p-4 shadow-sm">

    <div class="mb-3">
        <label class="form-label fw-bold">Cliente</label>
        <input type="text" class="form-control" value="{{ viaje.cliente }}" disabled>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Origen</label>
            <input type="text" name="origen" class="form-control" value="{{ viaje.origen }}" required>
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Destino</label>
            <input type="text" name="destino" class="form-control" value="{{ viaje.destino }}" required>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Precio</label>
        <input type="number" name="precio" class="form-control" value="{{ viaje.precio }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Combustible</label>
        <input type="number" name="combustible" class="form-control" value="{{ viaje.combustible }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Estado</label>
        <select name="estado" class="form-select">
            <option value="Pendiente"   {% if viaje.estado == "Pendiente" %}selected{% endif %}>Pendiente</option>
            <option value="Activo"      {% if viaje.estado == "Activo" %}selected{% endif %}>Activo</option>
            <option value="Completado"  {% if viaje.estado == "Completado" %}selected{% endif %}>Completado</option>
            <option value="Cancelado"   {% if viaje.estado == "Cancelado" %}selected{% endif %}>Cancelado</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Camionero</label>
        <select name="camionero" class="form-select">
            {% for c in camioneros %}
            <option value="{{ c.id }}" {% if viaje.camionero_id == c.id %}selected{% endif %}>
                {{ c.nombre }} — {{ c.estado }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Observaciones</label>
        <textarea name="observaciones" class="form-control" rows="3">{{ viaje.observaciones }}</textarea>
    </div>

    <button class="btn btn-primary btn-lg mt-3">Guardar Cambios</button>

</form>

{% endblock %}
