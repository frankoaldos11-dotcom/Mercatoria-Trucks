<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Viaje</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header">
            <h3>Editar Viaje #{{ viaje[0] }}</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Cliente</label>
                    <input type="text" name="cliente" class="form-control" value="{{ viaje[1] }}">
                </div>

                <div class="mb-3">
                    <label>Origen</label>
                    <input type="text" name="origen" class="form-control" value="{{ viaje[2] }}">
                </div>

                <div class="mb-3">
                    <label>Destino</label>
                    <input type="text" name="destino" class="form-control" value="{{ viaje[3] }}">
                </div>

                <div class="mb-3">
                    <label>Precio</label>
                    <input type="number" step="0.01" name="precio" class="form-control" value="{{ viaje[4] }}">
                </div>

                <div class="mb-3">
                    <label>Combustible</label>
                    <input type="number" step="0.01" name="combustible" class="form-control" value="{{ viaje[5] }}">
                </div>

                <div class="mb-3">
                    <label>Pago camionero</label>
                    <input type="number" step="0.01" name="camionero" class="form-control" value="{{ viaje[6] }}">
                </div>

                <div class="mb-3">
                    <label>Estado</label>
                    <select name="estado" class="form-control">
                        <option {% if viaje[9] == "Pendiente" %}selected{% endif %}>Pendiente</option>
                        <option {% if viaje[9] == "Asignado" %}selected{% endif %}>Asignado</option>
                        <option {% if viaje[9] == "En ruta" %}selected{% endif %}>En ruta</option>
                        <option {% if viaje[9] == "Entregado" %}selected{% endif %}>Entregado</option>
                        <option {% if viaje[9] == "Cancelado" %}selected{% endif %}>Cancelado</option>
                    </select>
                </div>

                <button class="btn btn-success">Guardar cambios</button>
                <a href="/viajes" class="btn btn-secondary">Cancelar</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
