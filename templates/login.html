<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Mercatoria Truck</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: #F3F4F6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
        }
        .brand { color: #E86A2C; font-weight: 700; font-size: 1.4rem; text-align: center; }
        .brand small { display: block; font-size: 0.8rem; color: #6B7280; font-weight: 400; margin-top: 2px; }
        .form-label { font-size: 0.82rem; font-weight: 600; color: #374151; margin-bottom: 4px; }
        .form-control {
            border-radius: 8px;
            border: 1.5px solid #D1D5DB;
            font-size: 0.9rem;
            padding: 0.65rem 0.75rem;
            width: 100%;
        }
        .form-control:focus {
            border-color: #E86A2C;
            box-shadow: 0 0 0 3px rgba(232,106,44,0.15);
            outline: none;
        }
        .btn-login {
            background: #E86A2C;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 0.65rem;
            width: 100%;
            transition: background 0.15s;
            cursor: pointer;
            margin-top: 0.25rem;
        }
        .btn-login:hover { background: #C45520; }
        .alert-error-custom {
            background: #FEF2F2;
            border-left: 4px solid #DC2626;
            color: #991B1B;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
        }
        .link-registro { font-size: 0.75rem; color: #9CA3AF; text-align: center; margin-top: 1.5rem; }
        .link-registro a { color: #6B7280; text-decoration: none; }
        .link-registro a:hover { color: #E86A2C; }
        .mb-3 { margin-bottom: 1rem; }
        .mb-4 { margin-bottom: 1.5rem; }
        .mb-4-brand { margin-bottom: 2rem; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand mb-4-brand">
        <i class="bi bi-truck-front-fill"></i> Mercatoria Truck
        <small>Acceso al sistema</small>
    </div>

    {% if error %}
    <div class="alert-error-custom">
        <i class="bi bi-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label">Usuario o correo electrónico</label>
            <input type="text" name="usuario" class="form-control" placeholder="usuario o correo@email.com" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login">Ingresar</button>
    </form>

    <div class="link-registro">
        ¿No tienes cuenta? <a href="/cliente/registro">Regístrate como cliente</a>
    </div>
</div>

</body>
</html>
