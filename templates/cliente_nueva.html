{% extends "base_cliente.html" %}

{% block title %}Nueva Solicitud{% endblock %}

{% block contenido %}

<h2 class="fw-bold mb-4">Nueva Solicitud de Transporte</h2>

<form action="/cliente/nueva" method="POST" class="card p-4 shadow-sm">

    <div class="mb-3">
        <label class="form-label fw-bold">Origen</label>
        <input type="text" name="origen" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Destino</label>
        <input type="text" name="destino" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Descripción de la carga</label>
        <textarea name="descripcion" class="form-control" rows="3" required></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Peso aproximado (kg)</label>
        <input type="number" name="peso" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Urgencia</label>
        <select name="urgencia" class="form-select">
            <option value="Normal">Normal</option>
            <option value="Alta">Alta</option>
            <option value="Crítica">Crítica</option>
        </select>
    </div>

    <button class="btn btn-primary btn-lg mt-3">Enviar Solicitud</button>

</form>

{% endblock %}
